<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter, Kept</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Great+Vibes&display=swap" rel="stylesheet">

<!-- GSAP Core + ScrollTrigger + ScrollToPlugin -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background Music Node -->
<audio id="bgMusic" src="your-audio-file.mp3" loop prefetch="auto"></audio>

<div class="grain"></div>
<div class="vignette"></div>
<canvas id="dust-canvas"></canvas>

<!-- GLASSMORPHIC MUSIC CONTROL BUTTON -->
<div id="musicBtn" class="glass-music-btn">
    <svg class="music-icon" viewBox="0 0 24 24">
        <path d="M9 18V5l11-2v13" />
        <circle cx="6" cy="18" r="3"/>
        <circle cx="17" cy="16" r="3"/>
    </svg>
    <span>Play Letter Theme</span>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="lamp"></div>
  <h1>A Letter, Kept</h1>
  <p>lighting the candle&hellip;</p>
</div>

<!-- VIRTUAL CINEMATIC CAMERA CONTAINER -->
<div class="camera-rig" id="cameraRig">
  <div class="scene">

    <!-- ================= INTRO / DESK ================= -->
    <section id="intro">
      <div class="desk-glow"></div>

      <div id="envelope-stage">
        <div class="envelope" id="envelope">
          <div class="env-body"></div>
          <div class="env-flap"></div>
          <div class="seal" id="seal" role="button" aria-label="Break the wax seal">
            <span>E</span>
          </div>
        </div>
        <div class="prompt-text">break the seal to begin</div>
      </div>

      <div class="desk-surface"></div>
    </section>

    <!-- ================= LETTER STAGE (unfold) ================= -->
    <div id="letter-stage">
      <div class="paper-wrap" id="paperWrap">
        <div class="fold-panel upper" id="foldUpper"></div>
        <div class="fold-panel lower" id="foldLower"></div>
      </div>
    </div>

    <!-- ================= SCROLLING LETTER CONTENT ================= -->
    <div class="scroll-track" id="scrollTrack" style="opacity:0;">
      <div class="spacer"></div>

      <article class="parchment" id="parchment">
        <svg class="corner-flourish tl" viewBox="0 0 100 100"><path d="M5 95 C5 40 40 5 95 5" fill="none" stroke="#6b2222" stroke-width="1.4" opacity="0.5"/><path d="M5 95 Q25 70 5 45" fill="none" stroke="#bca063" stroke-width="1.2"/><circle cx="95" cy="5" r="2.4" fill="#6b2222"/></svg>
        <svg class="corner-flourish tr" viewBox="0 0 100 100"><path d="M5 95 C5 40 40 5 95 5" fill="none" stroke="#6b2222" stroke-width="1.4" opacity="0.5"/><path d="M5 95 Q25 70 5 45" fill="none" stroke="#bca063" stroke-width="1.2"/><circle cx="95" cy="5" r="2.4" fill="#6b2222"/></svg>
        <svg class="corner-flourish bl" viewBox="0 0 100 100"><path d="M5 95 C5 40 40 5 95 5" fill="none" stroke="#6b2222" stroke-width="1.4" opacity="0.5"/><path d="M5 95 Q25 70 5 45" fill="none" stroke="#bca063" stroke-width="1.2"/><circle cx="95" cy="5" r="2.4" fill="#6b2222"/></svg>
        <svg class="corner-flourish br" viewBox="0 0 100 100"><path d="M5 95 C5 40 40 5 95 5" fill="none" stroke="#6b2222" stroke-width="1.4" opacity="0.5"/><path d="M5 95 Q25 70 5 45" fill="none" stroke="#bca063" stroke-width="1.2"/><circle cx="95" cy="5" r="2.4" fill="#6b2222"/></svg>

        <div class="artifact show" style="--r:0deg; margin-top:-30px; margin-bottom:10px;">
          <svg width="160" height="90" viewBox="0 0 160 90">
            <g opacity="0.75" stroke="#241911" stroke-width="1" fill="none">
              <path d="M95 15 A28 28 0 1 0 95 70 A22 22 0 1 1 95 15 Z" fill="#241911" opacity="0.12" stroke="#241911"/>
              <path d="M55 45 Q60 30 75 32 Q65 38 68 48 Q58 46 55 45Z" fill="#7a6b48" opacity="0.5"/>
              <path d="M45 55 Q50 48 58 50" />
              <circle cx="120" cy="20" r="1.4" fill="#241911"/>
              <circle cx="130" cy="35" r="1" fill="#241911"/>
              <circle cx="30" cy="30" r="1.2" fill="#241911"/>
              <path d="M118 55 l3 3 l-3 3 l-3 -3 Z" fill="#241911" opacity="0.6"/>
            </g>
          </svg>
        </div>

        <p class="type-block" data-text="My Dear Merin,"></p>

        <p class="type-block" data-text="I still remember the first time when I saw you. Maybe for the world it was a small interaction, but for me it was the beginning of an unforgettable memory. I never thought one notification could change my heart this much."></p>

        <p class="type-block" data-text="At first, we were just strangers scrolling through life, but day by day your messages became my happiness. Your replies became the reason I checked my phone again and again. Sometimes I think how destiny works — out of millions of people, you came into my life through a tiny screen, yet your presence filled my real world."></p>

        <div class="divider"><span class="line"></span><span class="mark">❦</span><span class="line"></span></div>

        <p class="type-block" data-text="There were days when your messages made my whole day beautiful. There were nights when your silence made my heart feel incomplete. I got used to your talks, your teas, and your charming presence."></p>

        <div class="artifact" style="--r:-2deg;">
          <svg width="130" height="100" viewBox="0 0 130 100">
            <g opacity="0.75" stroke="#241911" stroke-width="1.1" fill="none">
              <path d="M85 12 A32 32 0 1 0 85 78 A25 25 0 1 1 85 12 Z" fill="none"/>
              <path d="M40 55 Q46 40 62 42 Q50 48 54 60 Q42 58 40 55Z" fill="#7a6b48" opacity="0.5" stroke="none"/>
              <circle cx="105" cy="22" r="1.6" fill="#241911" stroke="none"/>
              <circle cx="112" cy="40" r="1.1" fill="#241911" stroke="none"/>
              <circle cx="20" cy="35" r="1.3" fill="#241911" stroke="none"/>
              <path d="M100 62 l3 3 l-3 3 l-3 -3 Z" fill="#241911" opacity="0.6" stroke="none"/>
            </g>
          </svg>
        </div>

        <p class="type-block" data-text="You entered my life so unexpectedly, but now your memories stay in my mind every single day. Sometimes I think... did you ever realize how important you have become to me? Because without noticing, you became a part of my heart, thoughts, routine."></p>

        <div class="divider"><span class="line"></span><span class="mark">✦</span><span class="line"></span></div>

        <p class="type-block" data-text="I don't know how to describe this feeling. Maybe attachment... maybe care... or maybe a silent love that grew between us through conversation."></p>

        <div class="divider"><span class="line"></span><span class="mark">❦</span><span class="line"></span></div>

        <p class="type-block" data-text="No matter what happens tomorrow, you will always be the love of mine. I love you, and I always will."></p>

        <div class="signature-wrap">
          <div class="signature" id="scriptSig">
            <svg width="240" height="80" viewBox="0 0 240 80">
              <path d="M 15 50 Q 35 15 50 45 T 80 35 T 110 55 T 140 30 T 170 50 T 200 25 Q 220 20 235 45" />
            </svg>
          </div>
          <div class="final-seal" id="finalSeal"><span>❦</span></div>
        </div>
      </article>

      <div class="spacer"></div>
    </div>
  </div>
</div>

<div id="ending-fade"><div class="end-msg">This letter represents my love for you. <br>
  If the Whole world loves You then i will be one of then and if nobody loves you then you should know i died. <br><br>
Reload to read again</div></div>

<script src="script.js"></script>
</body>
</html>
